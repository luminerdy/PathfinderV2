<!DOCTYPE html>
<html>
<head>
    <title>PathfinderV2 Control</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #4CAF50;
        }
        .video-container {
            background: #000;
            border: 2px solid #4CAF50;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        #video {
            width: 100%;
            display: block;
        }
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        button {
            background: #4CAF50;
            border: none;
            color: white;
            padding: 20px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #45a049;
        }
        button:active {
            background: #3d8b40;
        }
        .btn-stop {
            background: #f44336;
            grid-column: span 3;
        }
        .btn-stop:hover {
            background: #da190b;
        }
        .speed-control {
            background: #333;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .speed-control label {
            display: block;
            margin-bottom: 10px;
        }
        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: #555;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #4CAF50;
            cursor: pointer;
        }
        .status {
            background: #333;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .arrow {
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 PathfinderV2 Control</h1>
        
        <div class="video-container">
            <img id="video" src="{{ url_for('video_feed') }}" alt="Robot Camera">
        </div>
        
        <div class="speed-control">
            <label>Speed: <span id="speedValue">30</span></label>
            <input type="range" id="speedSlider" min="10" max="80" value="30">
        </div>
        
        <div class="controls">
            <div></div>
            <button onclick="move('forward')"><span class="arrow">▲</span><br>Forward</button>
            <div></div>
            
            <button onclick="move('left')"><span class="arrow">◄</span><br>Left</button>
            <button onclick="move('stop')"><span class="arrow">■</span><br>STOP</button>
            <button onclick="move('right')"><span class="arrow">►</span><br>Right</button>
            
            <button onclick="move('rotate_left')"><span class="arrow">⟲</span><br>Rotate L</button>
            <button onclick="move('backward')"><span class="arrow">▼</span><br>Back</button>
            <button onclick="move('rotate_right')"><span class="arrow">⟳</span><br>Rotate R</button>
        </div>
        
        <div class="status">
            <div>Battery: <span id="battery">--</span></div>
            <div>Camera: <span id="camera">--</span></div>
        </div>
    </div>
    
    <script>
        let currentSpeed = 30;
        
        // Speed slider
        document.getElementById('speedSlider').addEventListener('input', function(e) {
            currentSpeed = e.target.value;
            document.getElementById('speedValue').textContent = currentSpeed;
            
            fetch('/set_speed', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({speed: currentSpeed})
            });
        });
        
        // Movement commands
        function move(direction) {
            fetch('/move', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    direction: direction,
                    speed: currentSpeed
                })
            });
        }
        
        // Keyboard controls
        document.addEventListener('keydown', function(e) {
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                    move('forward');
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                case 's':
                    move('backward');
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                case 'a':
                    move('left');
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                case 'd':
                    move('right');
                    e.preventDefault();
                    break;
                case 'q':
                    move('rotate_left');
                    e.preventDefault();
                    break;
                case 'e':
                    move('rotate_right');
                    e.preventDefault();
                    break;
                case ' ':
                    move('stop');
                    e.preventDefault();
                    break;
            }
        });
        
        // Release keys to stop
        document.addEventListener('keyup', function(e) {
            if(['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'w', 'a', 's', 'd', 'q', 'e'].includes(e.key)) {
                move('stop');
            }
        });
        
        // Update status every 2 seconds
        function updateStatus() {
            fetch('/status')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('battery').textContent = data.battery;
                    document.getElementById('camera').textContent = data.camera;
                });
        }
        
        setInterval(updateStatus, 2000);
        updateStatus();
    </script>
</body>
</html>
