# Pathfinder Robot Configuration

robot:
  name: "Pathfinder"
  version: "2.0"
  platform: "Mobile Robot with Arm"
  hardware: "Raspberry Pi 5 8GB"

# Hardware Configuration
hardware:
  board:
    serial_port: "/dev/ttyAMA10"
    baud_rate: 1000000
    
  servos:
    # Arm servo IDs and ranges
    base: 
      id: 1
      range: [-90, 90]
    shoulder:
      id: 2
      range: [-90, 90]
    elbow:
      id: 3
      range: [-90, 90]
    wrist:
      id: 4
      range: [-90, 90]
    gripper:
      id: 5
      range: [0, 90]  # 0 = open, 90 = closed
      
  chassis:
    type: "mecanum"
    motor_pins:
      front_left: 1
      front_right: 2
      rear_left: 3
      rear_right: 4
    max_speed: 100
    wheel_diameter: 60  # mm
    wheel_base: 150     # mm
    track_width: 120    # mm
    
  camera:
    device: 0
    width: 640
    height: 480
    fps: 30
    
  sonar:
    trigger_pin: 23
    echo_pin: 24
    max_distance: 400  # cm
    
# Vision Configuration
vision:
  apriltag:
    family: "tag36h11"
    quad_decimate: 2.0
    quad_sigma: 0.0
    decode_sharpening: 0.25
    
  yolo:
    model: "yolov11n.pt"  # Nano model for Pi 5
    confidence: 0.5
    iou_threshold: 0.45
    device: "cpu"  # or "0" for GPU if available
    classes:
      - block
      - red_block
      - blue_block
      - green_block
      
# API Configuration
api:
  webserver:
    host: "0.0.0.0"
    port: 5000
    debug: false
    
  streaming:
    host: "0.0.0.0"
    port: 8080
    quality: 80
    
  gamepad:
    enabled: true
    deadzone: 0.1
    
# Movement presets
movement:
  speeds:
    slow: 30
    normal: 60
    fast: 90
    
  turn_rate: 45  # degrees per second
  
# Arm presets (in mm, relative to base)
arm_positions:
  home:
    x: 0
    y: 150
    z: 100
    
  pickup:
    x: 0
    y: 200
    z: 20
    
  carry:
    x: 0
    y: 100
    z: 150
    
  drop:
    x: 0
    y: 180
    z: 50

# Safety limits
safety:
  voltage_min: 6.8
  voltage_warn: 7.0
  temperature_max: 75
  sonar_emergency_stop: 10  # cm
